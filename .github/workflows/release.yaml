name: kist release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  publish-binaries:
    name: Publish binaries
    runs-on: ${{ matrix.build.RUNNER }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - {
              NAME: x86_64-linux,
              RUNNER: ubuntu-latest,
              TARGET: x86_64-unknown-linux-musl,
            }
          - {
              NAME: aarch64-linux,
              RUNNER: ubuntu-24.04-arm,
              TARGET: aarch64-unknown-linux-musl,
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools b3sum

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build.TARGET }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.build.TARGET }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          cp LICENSE-APACHE LICENSE-MIT README.md release/
          cp "target/${{ matrix.build.TARGET }}/release/kist" release/

      - name: Create release artifacts
        shell: bash
        run: |
          cp release/kist kist-${{ matrix.build.NAME }}
          b3sum kist-${{ matrix.build.NAME }} > kist-${{ matrix.build.NAME }}.b3sum
          tar -cJvf kist-${{ matrix.build.NAME }}.tar.xz release/
          b3sum kist-${{ matrix.build.NAME }}.tar.xz > kist-${{ matrix.build.NAME }}.tar.xz.b3sum

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: kist-${{ matrix.build.NAME }}*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}

      - name: Attest Build Provenance
        uses: actions/attest@v4
        with:
          subject-name: "kist-${{ matrix.build.NAME }}"
          subject-path: kist-${{ matrix.build.NAME }}*
